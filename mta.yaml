_schema-version: 3.3.0
ID: Weather_App
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: Weather_App-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: Weather_App-auth

  - name: Weather_App-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: Weather_App-destination
      - name: srv-api
        parameters:
          forwardAuthToken: true
      - name: Weather_App-html5-repo-runtime
      - name: Weather_App-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
      - name: Weather_App-auth
    build-parameters:
      build-result: app/
      requires:
        - name: Weather_Appweather_app
          artifacts:
            - weather_app.zip
          target-path: app/

  - name: Weather_Appweather_app
    type: html5
    path: app/weather_app
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

resources:

  - name: Weather_App-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: Weather_App-html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  - name: Weather_App-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: Weather_App-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"

  - name: Weather_App-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
